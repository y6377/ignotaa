<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IGNOTA</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/hero.css">

</head>

<body>

    <!-- Three.js가 들어갈 배경 -->
    <div id="scene-container"></div>

    <!-- 메인 화면 -->

    <div class="top-decor">

    <div class="line"></div>

    <div class="system-text">
        WORLD DATABASE v3.12
    </div>

    <div class="line"></div>

</div>
    
    <main class="hero">

        <div class="hero-text">

            <p class="subtitle">
                ARTIFICIAL PLANET
            </p>

            <h1>
                IGNOTA
            </h1>

            <p class="description">
                끝없이 펼쳐진 하늘 아래, <br>
                이곳은 마법사들에게 가장 안전한 안식처로 불린다
            </p>

        </div>

    </main>

    <!-- 홀로그램 태그 (임시 위치) -->
    <div class="planet-label label-1">
        <span class="sec">SEC-01</span>
        <h3>UNUS</h3>
    </div>

    <div class="planet-label label-2">
        <span class="sec">SEC-02</span>
        <h3>DUO</h3>
    </div>

    <div class="planet-label label-3">
        <span class="sec">SEC-03</span>
        <h3>TRES</h3>
    </div>

    <div class="planet-label label-4">
        <span class="sec">SEC-04</span>
        <h3>QUATTOUR</h3>
    </div>

    <div class="planet-label center-label">
        <span class="sec">CORE</span>
        <h3>CENTRUM</h3>
    </div>

    <!-- 우측 하단 메뉴 버튼 -->
    <button id="menuButton">
        <span>MENU</span>
    </button>

    <!-- Three.js -->
    <script type="module" src="https://unpkg.com/three@0.170.0/build/three.module.js"></script>

    <!-- JS -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
